<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳动爱心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            overflow: hidden;
            position: relative;
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: var(--opacity);
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: var(--opacity);
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.3);
            }
        }

        .heart {
            position: relative;
            width: 120px;
            height: 108px;
            animation: heartbeat 1.2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.6))
                    drop-shadow(0 0 40px rgba(255, 0, 0, 0.4))
                    drop-shadow(0 0 60px rgba(255, 0, 0, 0.2));
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            left: 60px;
            top: 0;
            width: 60px;
            height: 96px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff0000 50%, #cc0000 100%);
            border-radius: 60px 60px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
            box-shadow: inset -5px -5px 15px rgba(0, 0, 0, 0.2),
                        inset 5px 5px 15px rgba(255, 255, 255, 0.3);
        }

        .heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        /* 爱心高光效果 */
        .heart-shine {
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, transparent 70%);
            border-radius: 50%;
            top: 20px;
            left: 35px;
            z-index: 10;
            animation: shine 1.2s ease-in-out infinite;
        }

        @keyframes shine {
            0%, 100% {
                opacity: 0.6;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            10% {
                transform: scale(1.15);
            }
            20% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.15);
            }
            40% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.35);
            }
            60% {
                transform: scale(1);
            }
        }

        /* 光晕效果 */
        .glow {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: glow 1.2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glow {
            0%, 100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.5);
                opacity: 0.8;
            }
        }

        /* 添加粒子效果 */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.9) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 4s ease-in-out infinite;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: scale(1);
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-150px) translateX(var(--drift)) scale(0.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>
    
    <!-- 光晕效果 -->
    <div class="glow"></div>
    
    <!-- 爱心 -->
    <div class="heart">
        <div class="heart-shine"></div>
    </div>
    
    <!-- 浮动粒子 -->
    <div class="particles" id="particles"></div>

    <script>
        // 创建星空背景
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 200;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // 随机位置
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                
                // 随机大小
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                // 随机闪烁动画
                const duration = Math.random() * 3 + 2;
                star.style.setProperty('--duration', duration + 's');
                star.style.setProperty('--opacity', Math.random() * 0.7 + 0.3);
                
                // 随机延迟
                star.style.animationDelay = Math.random() * 5 + 's';
                
                starsContainer.appendChild(star);
            }
        }

        // 创建浮动粒子
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // 随机位置（从底部开始）
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = (Math.random() * 50 + 50) + '%';
                
                // 随机动画延迟和持续时间
                particle.style.animationDelay = Math.random() * 4 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                
                // 随机漂移距离
                const drift = (Math.random() - 0.5) * 100;
                particle.style.setProperty('--drift', drift + 'px');
                
                particlesContainer.appendChild(particle);
            }
        }

        createStars();
        createParticles();
    </script>
</body>
</html>
